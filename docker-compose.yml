services:
  # Go Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leag_sim_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_PORT: 8080
      APP_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: league_simulation_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - leag_sim_network

  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: leag_sim_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: league_simulation_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - leag_sim_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: leag_sim_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - leag_sim_network

  # Nginx (Reverse Proxy)
  nginx:
    image: nginx:alpine
    container_name: leag_sim_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - leag_sim_network

volumes:
  postgres_data:
  redis_data:

networks:
  leag_sim_network:
    driver: bridge
